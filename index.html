<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dungeon Crawler Prototype</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #181c24;
      --ink: #e9ecf1;
      --muted: #9aa3b2;
      --accent: #2ec27e;
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 25% 20%, #1b2030 0%, transparent 38%),
        radial-gradient(circle at 80% 70%, #24202f 0%, transparent 34%),
        var(--bg);
      color: var(--ink);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
    }

    .wrap {
      width: min(98vw, 1000px);
      padding: 12px;
      background: color-mix(in srgb, var(--panel) 92%, black);
      border: 1px solid #2a3141;
      border-radius: 12px;
      box-shadow: 0 20px 40px rgb(0 0 0 / 30%);
    }

    canvas {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 8px;
      border: 1px solid #2f3748;
      background: #0b0e13;
    }

    .help {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.45;
    }

    .help strong {
      color: var(--ink);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <canvas id="game" width="960" height="640" aria-label="Dungeon Crawler"></canvas>
    <div class="help">
      <strong>Controls:</strong> Move with W A S D. Left click to shoot toward the cursor. Press E to open chests. Reach the green square to finish the level.
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
